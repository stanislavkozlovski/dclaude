<svg xmlns="http://www.w3.org/2000/svg" width="1210" height="378" viewBox="0 0 1210 378" role="img" aria-labelledby="title desc">
  <title id="title">Venkat Raman post about explicit full-access mode</title>
  <desc id="desc">A recreated screenshot card of a post arguing that explicit full-access mode on a dedicated machine is preferable to constant permission prompts.</desc>
  <rect width="1210" height="378" fill="#ffffff"/>
  <circle cx="70" cy="70" r="36" fill="#6d9db1"/>
  <text x="130" y="54" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#111111">Venkat Raman - inference/acc</text>
  <circle cx="530" cy="42" r="12" fill="#1d9bf0"/>
  <text x="524" y="49" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff">v</text>
  <text x="554" y="54" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#536471">@venkat_systems · 14h</text>

  <text x="18" y="118" font-family="Arial, Helvetica, sans-serif" font-size="31" fill="#111111">
    <tspan x="18" dy="0">honestly, `codex -s danger-full-access -a never` is the way to go on have</tspan>
    <tspan x="18" dy="42">dedicated dev machine  😜</tspan>
  </text>

  <text x="95" y="228" font-family="Arial, Helvetica, sans-serif" font-size="31" fill="#111111">
    <tspan x="95" dy="0">'claude --permission-mode auto' is not good, it even asks permission for ls</tspan>
    <tspan x="95" dy="42">into proj subdir</tspan>
  </text>

  <circle cx="66" cy="333" r="14" fill="none" stroke="#536471" stroke-width="3"/>
  <path d="M358 320 l18 0 0 -12 16 16 -16 16 0 -12 -18 0 z" fill="none" stroke="#536471" stroke-width="3" stroke-linejoin="round"/>
  <path d="M665 332 c-10 -18 -36 -9 -36 11 0 16 18 28 36 42 18 -14 36 -26 36 -42 0 -20 -26 -29 -36 -11 z" fill="#ff2d6f"/>
  <text x="717" y="340" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ff2d6f">3</text>
  <path d="M909 309 v42 M925 321 v30 M941 302 v49 M957 314 v37" stroke="#536471" stroke-width="4"/>
  <text x="978" y="340" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#536471">1.2K</text>
  <path d="M1118 300 l20 0 0 38 -20 -12 -20 12 0 -38 z" fill="none" stroke="#536471" stroke-width="3"/>
  <path d="M1169 347 l0 -34 M1169 313 l-10 10 M1169 313 l10 10" fill="none" stroke="#536471" stroke-width="3" stroke-linecap="round"/>
</svg>
